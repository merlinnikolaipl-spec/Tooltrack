name: iOS App Store Build

on:
  workflow_dispatch:

jobs:
  build_ios:
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'

      - name: Install Apple certificate and provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

          PP_UUID=$(security cms -D -i $PP_PATH | plutil -extract UUID raw -)
          echo "PP_UUID=$PP_UUID" >> $GITHUB_ENV
          echo "PP_PATH=$PP_PATH" >> $GITHUB_ENV
          echo "Provisioning Profile UUID: $PP_UUID"

      - name: Write Google Service Info Plist
        env:
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
        run: |
          echo -n "$GOOGLE_SERVICE_INFO_PLIST" | base64 --decode -o ios/Runner/GoogleService-Info.plist

      - name: Create pubspec_overrides.yaml
        run: |
          cat > pubspec_overrides.yaml << 'OVERRIDESEOF'
          dependency_overrides:
            win32: 5.5.4
            pdf_widget_wrapper: 1.0.4
            mobile_scanner: 5.2.3
          OVERRIDESEOF

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter precache iOS
        run: flutter precache --ios
      - name: Write Podfile
        run: |
          cat > ios/Podfile << 'PODEOF'
          platform :ios, '13.0'

          ENV['COCOAPODS_DISABLE_STATS'] = 'true'

          project 'Runner', {
            'Debug' => :debug,
            'Profile' => :release,
            'Release' => :release,
          }

          def flutter_root
            generated_xcode_build_settings_path = File.expand_path(File.join('..', 'Flutter', 'Generated.xcconfig'), __FILE__)
            unless File.exist?(generated_xcode_build_settings_path)
              raise "#{generated_xcode_build_settings_path} must exist. If you're running pod install manually, make sure flutter pub get is executed first"
            end

            File.foreach(generated_xcode_build_settings_path) do |line|
              matches = line.match(/FLUTTER_ROOT\=(.*)/)
              return matches[1].strip if matches
            end
            raise "FLUTTER_ROOT not found in #{generated_xcode_build_settings_path}. Try deleting Generated.xcconfig and running flutter pub get"
          end

          require File.expand_path(File.join('packages', 'flutter_tools', 'bin', 'podhelper'), flutter_root)

          flutter_ios_podfile_setup

          target 'Runner' do
            use_frameworks!
            use_modular_headers!

            flutter_install_all_ios_pods File.dirname(File.realpath(__FILE__))
            target 'RunnerTests' do
              inherit! :search_paths
            end
          end

          post_install do |installer|
            installer.pods_project.targets.each do |target|
              flutter_additional_ios_build_settings(target)
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'
                config.build_settings['CODE_SIGN_IDENTITY'] = ''
                config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
                config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
                config.build_settings['GCC_TREAT_WARNINGS_AS_ERRORS'] = 'NO'
                config.build_settings['SWIFT_TREAT_WARNINGS_AS_ERRORS'] = 'NO'
              end
            end
          end
          PODEOF
      - name: Pod install
        run: |
          cd ios
          pod install --repo-update

      - name: Remove -GCC_WARN_INHIBIT_ALL_WARNINGS from Pods project
        run: |
          if [ -f "ios/Pods/Pods.xcodeproj/project.pbxproj" ]; then
            sed -i '' 's/-GCC_WARN_INHIBIT_ALL_WARNINGS//g' ios/Pods/Pods.xcodeproj/project.pbxproj
            echo "Removed -GCC_WARN_INHIBIT_ALL_WARNINGS from Pods project.pbxproj"
          else
            echo "Pods project.pbxproj not found, skipping"
          fi

      - name: Configure code signing for Runner
        run: |
          python3 << 'PYEOF'
          import os, re

          pbxproj_path = 'ios/Runner.xcodeproj/project.pbxproj'
          with open(pbxproj_path, 'r') as f:
              content = f.read()

          team_id = 'VHF76Z663B'
          pp_uuid = os.environ.get('PP_UUID', '')
          bundle_id = 'com.toolkeeper.app'

          print(f'PP_UUID from env: {pp_uuid}')

          content = re.sub(r'DEVELOPMENT_TEAM = [^;]*;', f'DEVELOPMENT_TEAM = {team_id};', content)
          content = re.sub(r'PRODUCT_BUNDLE_IDENTIFIER = [^;]*;', f'PRODUCT_BUNDLE_IDENTIFIER = {bundle_id};', content)
          content = re.sub(r'CODE_SIGN_STYLE = [^;]*;', 'CODE_SIGN_STYLE = Manual;', content)

          with open(pbxproj_path, 'w') as f:
              f.write(content)

          print('Updated project.pbxproj: DEVELOPMENT_TEAM, BUNDLE_IDENTIFIER, CODE_SIGN_STYLE')
          PYEOF
      - name: Build and archive iOS app
        run: |
          xcodebuild archive \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath $RUNNER_TEMP/Runner.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=VHF76Z663B \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE="$PP_UUID" \
            PROVISIONING_PROFILE_SPECIFIER="ToolKeeper App Store" \
            2>&1 | tee /tmp/xcodebuild.log | grep -A2 "error:"
          BUILD_RESULT=${PIPESTATUS[0]}
          echo "xcodebuild exit code: $BUILD_RESULT"
          echo "RUNNER_TEMP: $RUNNER_TEMP"
          echo "Archive path check:"
          ls -la $RUNNER_TEMP/ | grep xcarchive || echo "NO xcarchive found in RUNNER_TEMP"
          if [ $BUILD_RESULT -ne 0 ]; then
            echo "=== BUILD FAILED - LAST 100 LINES ==="
            tail -100 /tmp/xcodebuild.log
            exit $BUILD_RESULT
          fi
          echo "=== BUILD SUCCEEDED ==="

      - name: Export IPA
        run: |
          echo "Checking archive at: $RUNNER_TEMP/Runner.xcarchive"
          ls -la $RUNNER_TEMP/ | grep xcarchive || echo "NO xcarchive!"

          cat > $RUNNER_TEMP/ExportOptions.plist << 'EXPORTEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>VHF76Z663B</string>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.toolkeeper.app</key>
              <string>ToolKeeper App Store</string>
            </dict>
          </dict>
          </plist>
          EXPORTEOF

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Runner.xcarchive \
            -exportPath $RUNNER_TEMP/export \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist

      - name: Upload to TestFlight
        env:
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.private_keys
          echo -n "$ASC_PRIVATE_KEY" | base64 --decode > ~/.private_keys/AuthKey_CACM4VT79N.p8

          xcrun altool --upload-app \
            --type ios \
            --file $RUNNER_TEMP/export/ToolKeeper.ipa \
            --apiKey CACM4VT79N \
            --apiIssuer 84281d71-d333-4cf7-8580-3771c0b45e85 \
            --verbose || \
          xcrun altool --upload-app \
            --type ios \
            --file "$(find $RUNNER_TEMP/export -name '*.ipa' | head -1)" \
            --apiKey CACM4VT79N \
            --apiIssuer 84281d71-d333-4cf7-8580-3771c0b45e85 \
            --verbose
