name: iOS App Store Build

on:
  workflow_dispatch:

jobs:
  build_ios:
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: 'stable'

      - name: Install Apple certificate and provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/
          PP_UUID=$(security cms -D -i $PP_PATH | plutil -extract UUID raw -)
          echo "PP_UUID=$PP_UUID" >> $GITHUB_ENV
          echo "Provisioning profile UUID: $PP_UUID"

      - name: Setup Google Services
        env:
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
        run: |
          echo -n "$GOOGLE_SERVICE_INFO_PLIST" | base64 --decode -o ios/Runner/GoogleService-Info.plist

      - name: Write pubspec overrides
        run: |
          python3 -c "
          content = 'dependency_overrides:\n  win32: 5.5.4\n  pdf_widget_wrapper: 1.0.4\n  mobile_scanner: 5.2.3\n'
          with open('pubspec_overrides.yaml', 'w') as f:
              f.write(content)
          "

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter precache iOS
        run: flutter precache --ios

      - name: Write Podfile
        run: |
          python3 -c "
          lines = []
          lines.append(\"# Uncomment this line to define a global platform for your project\")
          lines.append(\"platform :ios, '13.0'\")
          lines.append(\"\")
          lines.append(\"# CocoaPods analytics sends network stats synchronously affecting flutter build latency.\")
          lines.append(\"ENV['COCOAPODS_DISABLE_STATS'] = 'true'\")
          lines.append(\"\")
          lines.append(\"project 'Runner', {\")
          lines.append(\"  'Debug' => :debug,\")
          lines.append(\"  'Profile' => :release,\")
          lines.append(\"  'Release' => :release,\")
          lines.append(\"}  \")
          lines.append(\"\")
          lines.append(\"def flutter_root\")
          lines.append(\"  generated_xcode_build_settings_path = File.expand_path(File.join('..', 'Flutter', 'Generated.xcconfig'), __FILE__)\")
          lines.append(\"  unless File.exist?(generated_xcode_build_settings_path)\")
          lines.append(\"    raise \\\"#{generated_xcode_build_settings_path} must exist. If you're running pod install manually, make sure flutter pub get is executed first\\\"\")
          lines.append(\"  end\")
          lines.append(\"  File.foreach(generated_xcode_build_settings_path) do |line|\")
          lines.append(\"    matches = line.match(/FLUTTER_ROOT\\\\=(.*)/) \")
          lines.append(\"    return matches[1].strip if matches\")
          lines.append(\"  end\")
          lines.append(\"  raise \\\"FLUTTER_ROOT not found in #{generated_xcode_build_settings_path}. Try deleting Generated.xcconfig and running flutter pub get again.\\\"\")
          lines.append(\"end\")
          lines.append(\"\")
          lines.append(\"require File.expand_path(File.join(flutter_root, 'packages', 'flutter_tools', 'bin', 'podhelper'), __FILE__)\")
          lines.append(\"\")
          lines.append(\"flutter_ios_podfile_setup\")
          lines.append(\"\")
          lines.append(\"target 'Runner' do\")
          lines.append(\"  use_frameworks!\")
          lines.append(\"  use_modular_headers!\")
          lines.append(\"\")
          lines.append(\"  flutter_install_all_ios_pods File.dirname(File.realpath(__FILE__))\")
          lines.append(\"  target 'RunnerTests' do\")
          lines.append(\"    inherit! :search_paths\")
          lines.append(\"  end\")
          lines.append(\"end\")
          lines.append(\"\")
          lines.append(\"post_install do |installer|\")
          lines.append(\"  installer.pods_project.targets.each do |target|\")
          lines.append(\"    flutter_additional_ios_build_settings(target)\")
          lines.append(\"    target.build_configurations.each do |config|\")
          lines.append(\"      config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'\")
          lines.append(\"      config.build_settings['CODE_SIGN_IDENTITY'] = ''\")
          lines.append(\"    end\")
          lines.append(\"  end\")
          lines.append(\"end\")
          with open('ios/Podfile', 'w') as f:
              f.write('\\n'.join(lines) + '\\n')
          print('Podfile written successfully')
          "

      - name: Configure code signing
        env:
          PP_UUID: ${{ env.PP_UUID }}
        run: |
          python3 -c "
          import os, re
          pp_uuid = os.environ.get('PP_UUID', '')
          print('PP UUID:', pp_uuid)
          pbx = 'ios/Runner.xcodeproj/project.pbxproj'
          with open(pbx, 'r') as f:
              c = f.read()
          c = re.sub(r'CODE_SIGN_STYLE = Automatic;', 'CODE_SIGN_STYLE = Manual;', c)
          c = re.sub(r'DEVELOPMENT_TEAM = [^;]*;', 'DEVELOPMENT_TEAM = VHF76Z663B;', c)
          with open(pbx, 'w') as f:
              f.write(c)
          print('Code signing configured')
          "

      - name: Pod install
        run: |
          cd ios
          pod install --repo-update

      - name: Patch -G flag from all sources
        run: |
          echo "=== Searching for -G in all xcconfig and xcodeproj files ==="
          python3 -c "
          import os, re, glob

          def remove_G_flag(text):
              # Remove -G followed by whitespace or end of string or special chars
              # This covers: '-G ', '-G$', '-G	', '-G
', '-G;', '-G"'
              result = re.sub(r'-G(?=[s\"\\`;\)\}]|$)', '', text)
              return result

          patched = []

          # Patch ALL xcconfig files (Pods AND Flutter)
          all_xcconfig = []
          all_xcconfig += glob.glob('ios/Pods/**/*.xcconfig', recursive=True)
          all_xcconfig += glob.glob('ios/Flutter/**/*.xcconfig', recursive=True)
          all_xcconfig += glob.glob('ios/*.xcconfig', recursive=False)

          for f in all_xcconfig:
              try:
                  with open(f, 'r') as fh:
                      content = fh.read()
                  if '-G' in content:
                      new_content = remove_G_flag(content)
                      if new_content != content:
                          with open(f, 'w') as fh:
                              fh.write(new_content)
                          patched.append(f)
                          print(f'Patched xcconfig: {f}')
                  # Also just print xcconfig content if it has OTHER_CFLAGS
                  if 'OTHER_CFLAGS' in content:
                      for line in content.split(chr(10)):
                          if 'OTHER_CFLAGS' in line:
                              print(f'  {f}: {line.strip()}')
              except Exception as e:
                  print(f'Error processing {f}: {e}')

          # Patch Pods project.pbxproj
          pbxproj = 'ios/Pods/Pods.xcodeproj/project.pbxproj'
          if os.path.exists(pbxproj):
              with open(pbxproj, 'r') as fh:
                  content = fh.read()
              if '-G' in content:
                  new_content = remove_G_flag(content)
                  with open(pbxproj, 'w') as fh:
                      fh.write(new_content)
                  patched.append(pbxproj)
                  print(f'Patched Pods pbxproj')

          print(f'Patched {len(patched)} files total')
          "

      - name: Build and archive iOS app
        env:
          PP_UUID: ${{ env.PP_UUID }}
        run: |
          cd ios
          xcodebuild archive \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -sdk iphoneos \
            -archivePath build/Runner.xcarchive \
            -configuration Release \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=VHF76Z663B \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE="$PP_UUID" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            2>&1 | tee /tmp/xcodebuild.log | xcpretty --color; \
          EXIT_CODE=${PIPESTATUS[0]}; \
          if [ $EXIT_CODE -ne 0 ]; then \
            echo "=== XCODEBUILD FAILED - showing errors ==="; \
            grep -A5 "error:" /tmp/xcodebuild.log | head -100; \
            exit $EXIT_CODE; \
          fi

      - name: Export and sign IPA
        env:
          PP_UUID: ${{ env.PP_UUID }}
        run: |
          mkdir -p ios/build/export
          python3 -c "
          import os
          pp_uuid = os.environ.get('PP_UUID', '')
          plist = '''<?xml version=\"1.0\" encoding=\"UTF-8\"?>
          <!DOCTYPE plist PUBLIC \"-//Apple//DTD PLIST 1.0//EN\" \"http://www.apple.com/DTDs/PropertyList-1.0.dtd\">
          <plist version=\"1.0\">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>VHF76Z663B</string>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.toolkeeper.app</key>
              <string>''' + pp_uuid + '''</string>
            </dict>
          </dict>
          </plist>'''
          with open('/tmp/ExportOptions.plist', 'w') as f:
              f.write(plist)
          print('ExportOptions.plist written')
          "
          xcodebuild -exportArchive \
            -archivePath ios/build/Runner.xcarchive \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath ios/build/export \
            | xcpretty --color

      - name: Upload to TestFlight
        env:
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
          ASC_KEY_ID: CACM4VT79N
          ASC_ISSUER_ID: 84281d71-d333-4cf7-8580-3771c0b45e85
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          python3 -c "
          import os, base64
          key = os.environ.get('ASC_PRIVATE_KEY', '')
          try:
              decoded = base64.b64decode(key).decode('utf-8')
          except Exception:
              decoded = key
          key_path = os.path.expanduser('~/.appstoreconnect/private_keys/AuthKey_CACM4VT79N.p8')
          with open(key_path, 'w') as f:
              f.write(decoded)
          print('Key written')
          "
          xcrun altool --upload-app \
            -f ios/build/export/*.ipa \
            --type ios \
            --apiKey CACM4VT79N \
            --apiIssuer 84281d71-d333-4cf7-8580-3771c0b45e85 \
            --show-progress

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ios/build/export/*.ipa
          if-no-files-found: ignore
