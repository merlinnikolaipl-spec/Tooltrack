name: iOS App Store Build

on:
  workflow_dispatch:

jobs:
  build_ios:
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: 'stable'

      - name: Install Apple certificate and provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KP=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERT_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KP
          security set-keychain-settings -lut 21600 $KP
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KP
          security import $CERT_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KP
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KP
          security list-keychain -d user -s $KP
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles
          PP_UUID=$(security cms -D -i $PP_PATH | plutil -p - | grep '"UUID"' | awk -F'"' '{print $4}')
          echo "PP_UUID=$PP_UUID" >> $GITHUB_ENV
          echo "Provisioning profile UUID: $PP_UUID"

      - name: Setup Google Services
        env:
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
        run: echo "$GOOGLE_SERVICE_INFO_PLIST" > ios/Runner/GoogleService-Info.plist

      - name: Write pubspec overrides
        run: |
          printf 'dependency_overrides:\n  win32: 5.5.4\n  pdf_widget_wrapper: 1.0.4\n  mobile_scanner: 5.2.3\n' > pubspec_overrides.yaml

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter precache iOS
        run: flutter precache --ios

      - name: Patch Podfile to remove -G flag
        run: |
          python3 -c "
          with open('ios/Podfile', 'r') as f:
            lines = f.readlines()
          result = []
          for line in lines:
            result.append(line)
            stripped = line.strip()
            if stripped == 'flutter_additional_ios_build_settings(target)':
              indent = len(line) - len(line.lstrip())
              sp = ' ' * indent
              result.append(sp + 'config.build_settings[\'OTHER_CFLAGS\'] = \'$(inherited)\'' + '\n')
              result.append(sp + 'config.build_settings[\'OTHER_CPLUSPLUSFLAGS\'] = \'$(inherited)\'' + '\n')
          with open('ios/Podfile', 'w') as f:
            f.writelines(result)
          print('Patched ok')
          "

      - name: Configure code signing
        env:
          PP_UUID: ${{ env.PP_UUID }}
        run: |
          python3 -c "
          import os, re
          uuid = os.environ.get('PP_UUID', '').strip()
          print('Using PP_UUID:', uuid)
          with open('ios/Runner.xcodeproj/project.pbxproj', 'r') as f:
            content = f.read()
          content = content.replace('CODE_SIGN_STYLE = Automatic;', 'CODE_SIGN_STYLE = Manual;')
          content = content.replace('CODE_SIGN_IDENTITY = \"iPhone Developer\";', 'CODE_SIGN_IDENTITY = \"Apple Distribution\";')
          content = content.replace('DEVELOPMENT_TEAM = \"\";', 'DEVELOPMENT_TEAM = VHF76Z663B;')
          content = content.replace('DEVELOPMENT_TEAM = ;', 'DEVELOPMENT_TEAM = VHF76Z663B;')
          if uuid:
            content = re.sub(r'PROVISIONING_PROFILE_SPECIFIER = [^;]*;', 'PROVISIONING_PROFILE_SPECIFIER = "' + uuid + '";', content)
            if 'PROVISIONING_PROFILE_SPECIFIER' not in content:
              content = content.replace('CODE_SIGN_IDENTITY = \"Apple Distribution\";', 'CODE_SIGN_IDENTITY = \"Apple Distribution\";\n\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = \"' + uuid + '\";')
          with open('ios/Runner.xcodeproj/project.pbxproj', 'w') as f:
            f.write(content)
          print('Code signing configured with UUID:', uuid)
          "

      - name: Pod install
        run: cd ios && pod install --repo-update

      - name: Build iOS app
        env:
          PP_UUID: ${{ env.PP_UUID }}
        run: |
          security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" $RUNNER_TEMP/app-signing.keychain-db
          flutter build ipa --release --export-method app-store
          find build -name "*.ipa" 2>/dev/null || echo "No IPA found"

      - name: Upload to TestFlight
        env:
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          python3 -c "
          import base64, os
          key = os.environ['ASC_PRIVATE_KEY'].strip()
          try:
            decoded = base64.b64decode(key).decode('utf-8')
          except:
            decoded = key
          open(os.path.expanduser('~/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8'), 'w').write(decoded)
          print('Key written')
          "
          IPA=$(find build -name "*.ipa" | head -1)
          echo "Uploading: $IPA"
          xcrun altool --upload-app --type ios --file "$IPA" --apiKey "${{ secrets.ASC_KEY_ID }}" --apiIssuer "${{ secrets.ASC_ISSUER_ID }}" --verbose

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ios-ipa
          path: build/ios/ipa/*.ipa
          if-no-files-found: warn
