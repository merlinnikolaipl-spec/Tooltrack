name: iOS App Store Build

on:
  workflow_dispatch:

jobs:
  build_ios:
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: 'stable'

      - name: Install Apple certificate and provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/
          PP_UUID=$(security cms -D -i $PP_PATH | plutil -extract UUID raw -)
          echo "PP_UUID=$PP_UUID" >> $GITHUB_ENV
          echo "Provisioning profile UUID: $PP_UUID"

      - name: Setup Google Services
        env:
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
        run: |
          echo -n "$GOOGLE_SERVICE_INFO_PLIST" | base64 --decode -o ios/Runner/GoogleService-Info.plist

      - name: Write pubspec overrides
        run: |
          cat > pubspec_overrides.yaml << 'EOF'
          dependency_overrides:
            win32: 5.5.4
            pdf_widget_wrapper: 1.0.4
            mobile_scanner: 5.2.3
          EOF

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter precache iOS
        run: flutter precache --ios

      - name: Write Podfile
        run: |
          cat > ios/Podfile << 'PODEOF'
          platform :ios, '13.0'

          ENV['COCOAPODS_DISABLE_STATS'] = 'true'

          project 'Runner', {
            'Debug' => :debug,
            'Profile' => :release,
            'Release' => :release,
          }

          def flutter_root
            generated_xcode_build_settings_path = File.expand_path(File.join('..', 'Flutter', 'Generated.xcconfig'), __FILE__)
            unless File.exist?(generated_xcode_build_settings_path)
              raise "#{generated_xcode_build_settings_path} must exist. If you're running pod install manually, make sure flutter pub get is executed first"
            end
            File.foreach(generated_xcode_build_settings_path) do |line|
              matches = line.match(/FLUTTER_ROOT=(.*)/)
              return matches[1].strip if matches
            end
            raise "FLUTTER_ROOT not found in #{generated_xcode_build_settings_path}."
          end

          require File.expand_path(File.join(flutter_root, 'packages', 'flutter_tools', 'bin', 'podhelper'), __FILE__)

          flutter_ios_podfile_setup

          target 'Runner' do
            use_frameworks!
            use_modular_headers!

            flutter_install_all_ios_pods File.dirname(File.realpath(__FILE__))
            target 'RunnerTests' do
              inherit! :search_paths
            end
          end

          post_install do |installer|
            installer.pods_project.targets.each do |target|
              flutter_additional_ios_build_settings(target)
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'
                config.build_settings['CODE_SIGN_IDENTITY'] = ''
                config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
                config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
              end
            end
          end
          PODEOF
          echo "Podfile written"

      - name: Configure code signing
        env:
          PP_UUID: ${{ env.PP_UUID }}
        run: |
          python3 << 'PYEOF'
          import os, re
          pp_uuid = os.environ.get('PP_UUID', '')
          print('PP UUID:', pp_uuid)
          pbx = 'ios/Runner.xcodeproj/project.pbxproj'
          with open(pbx, 'r') as f:
              c = f.read()
          c = re.sub(r'CODE_SIGN_STYLE = Automatic;', 'CODE_SIGN_STYLE = Manual;', c)
          c = re.sub(r'DEVELOPMENT_TEAM = [^;]*;', 'DEVELOPMENT_TEAM = VHF76Z663B;', c)
          c = re.sub(r'PROVISIONING_PROFILE_SPECIFIER = [^;]*;', 'PROVISIONING_PROFILE_SPECIFIER = "ToolKeeper App Store";', c)
          with open(pbx, 'w') as f:
              f.write(c)
          print('Code signing configured')
          PYEOF

      - name: Pod install
        run: |
          cd ios
          pod install --repo-update

      - name: Remove -G flag from all build files
        run: |
          echo "=== Patching xcconfig files ==="
          find ios/Pods -name "*.xcconfig" | xargs grep -l -- " -G" 2>/dev/null | while read f; do
            echo "Found -G in xcconfig: $f"
            sed -i '' 's/ -G / /g; s/ -G$//g' "$f"
            echo "Patched: $f"
          done
          echo "=== Patching Pods.xcodeproj/project.pbxproj ==="
          PBXPROJ="ios/Pods/Pods.xcodeproj/project.pbxproj"
          if [ -f "$PBXPROJ" ]; then
            if grep -q -- "-G" "$PBXPROJ"; then
              echo "Found -G in Pods.xcodeproj/project.pbxproj"
              grep -n -- " -G" "$PBXPROJ" | head -20
              sed -i '' 's/ -G / /g; s/ -G$//g; s/-G //g' "$PBXPROJ"
              echo "Patched Pods.xcodeproj/project.pbxproj"
              grep -n -- " -G" "$PBXPROJ" | head -5 || echo "No more -G found"
            else
              echo "No -G found in Pods.xcodeproj/project.pbxproj"
            fi
          fi
          echo "=== Checking BoringSSL-GRPC settings ==="
          find ios/Pods -name "*.xcconfig" | xargs grep -l "BoringSSL" 2>/dev/null | while read f; do
            echo "BoringSSL xcconfig: $f"
            cat "$f"
          done
          echo "=== Done ==="

      - name: Build and archive iOS app
        env:
          PP_UUID: ${{ env.PP_UUID }}
        run: |
          cd ios
          xcodebuild archive \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -sdk iphoneos \
            -archivePath build/Runner.xcarchive \
            -configuration Release \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=VHF76Z663B \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE="$PP_UUID" \
            PROVISIONING_PROFILE_SPECIFIER="ToolKeeper App Store" \
            2>&1 | tee /tmp/xcodebuild.log | xcpretty --color; \
          EXIT=${PIPESTATUS[0]}; \
          if [ $EXIT -ne 0 ]; then \
            grep -E "error:" /tmp/xcodebuild.log | head -50; \
            exit $EXIT; \
          fi

      - name: Export and sign IPA
        env:
          PP_UUID: ${{ env.PP_UUID }}
        run: |
          mkdir -p ios/build/export
          python3 << 'PYEOF'
          import os
          pp_uuid = os.environ.get('PP_UUID', '')
          plist = (
              '<?xml version="1.0" encoding="UTF-8"?>\n'
              '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" '
              '"http://www.apple.com/DTDs/PropertyList-1.0.dtd">\n'
              '<plist version="1.0"><dict>\n'
              '<key>method</key><string>app-store</string>\n'
              '<key>teamID</key><string>VHF76Z663B</string>\n'
              '<key>uploadSymbols</key><true/>\n'
              '<key>compileBitcode</key><false/>\n'
              '<key>provisioningProfiles</key><dict>\n'
              '<key>com.toolkeeper.app</key><string>' + pp_uuid + '</string>\n'
              '</dict></dict></plist>\n'
          )
          with open('/tmp/ExportOptions.plist', 'w') as f:
              f.write(plist)
          print('ExportOptions.plist written for UUID:', pp_uuid)
          PYEOF
          xcodebuild -exportArchive \
            -archivePath ios/build/Runner.xcarchive \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath ios/build/export \
            | xcpretty --color

      - name: Upload to TestFlight
        env:
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          python3 << 'PYEOF'
          import os, base64
          key = os.environ.get('ASC_PRIVATE_KEY', '')
          try:
              decoded = base64.b64decode(key).decode('utf-8')
          except Exception:
              decoded = key
          key_path = os.path.expanduser('~/.appstoreconnect/private_keys/AuthKey_CACM4VT79N.p8')
          with open(key_path, 'w') as f:
              f.write(decoded)
          print('Key written')
          PYEOF
          xcrun altool --upload-app \
            -f ios/build/export/*.ipa \
            --type ios \
            --apiKey CACM4VT79N \
            --apiIssuer 84281d71-d333-4cf7-8580-3771c0b45e85 \
            --show-progress

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ios/build/export/*.ipa
          if-no-files-found: ignore
