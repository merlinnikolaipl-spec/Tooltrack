name: iOS App Store Build

on:
  workflow_dispatch:

jobs:
  build_ios:
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: 'stable'

      - name: Install Apple certificate and provisioning profile
        env:
          P12_CERTIFICATE_BASE64: ${{ secrets.P12_CERTIFICATE_BASE64 }}
          P12_CERTIFICATE_PASSWORD: ${{ secrets.P12_CERTIFICATE_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "$P12_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o $PP_PATH
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$P12_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Setup Google Services
        env:
          GOOGLE_SERVICES_PLIST: ${{ secrets.GOOGLE_SERVICES_PLIST }}
        run: |
          echo "$GOOGLE_SERVICES_PLIST" > ios/Runner/GoogleService-Info.plist

      - name: Write pubspec overrides
        run: |
          python3 -c "
          with open('pubspec_overrides.yaml', 'w') as f:
              f.write('dependency_overrides:\n  win32: 5.5.4\n  pdf_widget_wrapper: 1.0.4\n  mobile_scanner: 5.2.3\n')
          print('pubspec_overrides written')
          "

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter precache iOS
        run: flutter precache --ios

      - name: Write Podfile
        run: |
          python3 -c "
          L = []
          L.append(\"platform :ios, '13.0'\")
          L.append('')
          L.append(\"ENV['COCOAPODS_DISABLE_STATS'] = 'true'\")
          L.append('')
          L.append(\"project 'ios/Runner.xcodeproj',\")
          L.append(\"  'Debug' => :debug,\")
          L.append(\"  'Profile' => :release,\")
          L.append(\"  'Release' => :release,\")
          L.append('')
          L.append('def flutter_root')
          L.append(\"  path = File.expand_path(File.join('..', 'Flutter', 'Generated.xcconfig'), __FILE__)\")
          L.append('  unless File.exist?(path)')
          L.append(\"    raise 'Run flutter pub get first'\")
          L.append('  end')
          L.append('  File.foreach(path) do |line|')
          L.append(\"    m = line.match(/FLUTTER_ROOT\\\\=(.*)/)\")
          L.append('    return m[1].strip if m')
          L.append('  end')
          L.append(\"  raise 'FLUTTER_ROOT not found'\")
          L.append('end')
          L.append('')
          L.append(\"require File.expand_path(File.join('packages', 'flutter_tools', 'bin', 'podhelper'), flutter_root)\")
          L.append('')
          L.append('flutter_ios_podfile_setup')
          L.append('')
          L.append(\"target 'Runner' do\")
          L.append('  use_frameworks!')
          L.append('  use_modular_headers!')
          L.append('')
          L.append('  flutter_install_all_ios_pods File.dirname(File.realpath(__FILE__))')
          L.append('')
          L.append(\"  target 'RunnerTests' do\")
          L.append('    inherit! :search_paths')
          L.append('  end')
          L.append('end')
          L.append('')
          L.append('post_install do |installer|')
          L.append('  installer.pods_project.targets.each do |target|')
          L.append('    target.build_configurations.each do |config|')
          L.append(\"      config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'\")
          L.append(\"      config.build_settings['OTHER_CFLAGS'] = '$(inherited)'\")
          L.append(\"      config.build_settings['OTHER_CPLUSPLUSFLAGS'] = '$(inherited)'\")
          L.append('    end')
          L.append('  end')
          L.append('end')
          with open('ios/Podfile', 'w') as f:
              f.write('\n'.join(L) + '\n')
          print('Podfile written')
          "

      - name: Configure code signing
        run: |
          python3 -c "
          import re
          f = 'ios/Runner.xcodeproj/project.pbxproj'
          with open(f) as fh: c = fh.read()
          c = re.sub(r'CODE_SIGN_STYLE = Automatic;', 'CODE_SIGN_STYLE = Manual;', c)
          c = re.sub(r'DEVELOPMENT_TEAM = [A-Z0-9]*;', 'DEVELOPMENT_TEAM = VHF76Z663B;', c)
          c = re.sub(r'PROVISIONING_PROFILE_SPECIFIER = [^;]*;', '', c)
          with open(f, 'w') as fh: fh.write(c)
          print('Code signing configured')
          "

      - name: Pod install
        run: cd ios && pod install --repo-update && cd ..

      - name: Build and archive iOS app
        env:
          RUNNER_TEMP: ${{ runner.temp }}
        run: |
          security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" $RUNNER_TEMP/app-signing.keychain-db

          PP_UUID=$(python3 -c "
          import plistlib, os
          d = os.path.expanduser('~/Library/MobileDevice/Provisioning Profiles')
          for f in os.listdir(d):
              if f.endswith('.mobileprovision'):
                  with open(os.path.join(d,f),'rb') as fh: raw=fh.read()
                  s=raw.find(b'<?xml'); e=raw.find(b'</plist>')+8
                  print(plistlib.loads(raw[s:e]).get('UUID',''))
                  break
          ")
          echo "UUID: $PP_UUID"

          xcodebuild archive \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath build/ios/archive/Runner.xcarchive \
            -destination "generic/platform=iOS" \
            OTHER_CFLAGS='$(inherited)' \
            OTHER_CPLUSPLUSFLAGS='$(inherited)' \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=VHF76Z663B \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE="$PP_UUID"

      - name: Export and sign IPA
        run: |
          PP_UUID=$(python3 -c "
          import plistlib, os
          d = os.path.expanduser('~/Library/MobileDevice/Provisioning Profiles')
          for f in os.listdir(d):
              if f.endswith('.mobileprovision'):
                  with open(os.path.join(d,f),'rb') as fh: raw=fh.read()
                  s=raw.find(b'<?xml'); e=raw.find(b'</plist>')+8
                  print(plistlib.loads(raw[s:e]).get('UUID',''))
                  break
          ")

          python3 -c "
          pp='$PP_UUID'
          q=chr(34); n=chr(10)
          c='<?xml version='+q+'1.0'+q+' encoding='+q+'UTF-8'+q+'?>'+n
          c+='<!DOCTYPE plist PUBLIC '+q+'-//Apple//DTD PLIST 1.0//EN'+q+' '+q+'http://www.apple.com/DTDs/PropertyList-1.0.dtd'+q+'>'+n
          c+='<plist version='+q+'1.0'+q+'><dict>'+n
          c+='<key>method</key><string>app-store</string>'+n
          c+='<key>teamID</key><string>VHF76Z663B</string>'+n
          c+='<key>uploadBitcode</key><false/>'+n
          c+='<key>signingStyle</key><string>manual</string>'+n
          c+='<key>provisioningProfiles</key><dict>'+n
          c+='<key>com.toolkeeper.app</key><string>'+pp+'</string>'+n
          c+='</dict></dict></plist>'
          open('ExportOptions.plist','w').write(c)
          print('ExportOptions written')
          "

          xcodebuild -exportArchive \
            -archivePath build/ios/archive/Runner.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist ExportOptions.plist

      - name: Upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          python3 -c "
          import base64, os
          key = os.environ['ASC_PRIVATE_KEY'].strip()
          try: decoded = base64.b64decode(key).decode('utf-8')
          except: decoded = key
          open(os.path.expanduser('~/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8'),'w').write(decoded)
          print('Key written')
          "
          IPA=$(find build -name '*.ipa' | head -1)
          xcrun altool --upload-app --type ios --file "$IPA" --apiKey "${{ secrets.ASC_KEY_ID }}" --apiIssuer "${{ secrets.ASC_ISSUER_ID }}" --private-key ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8 --verbose

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ios-ipa
          path: build/ios/ipa/*.ipa
          if-no-files-found: warn
