name: iOS App Store Build

on:
  workflow_dispatch:

jobs:
  build_ios:
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'

      - name: Install Apple certificate and provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/
          PP_UUID=$(security cms -D -i $PP_PATH | plutil -extract UUID raw -)
          echo "PP_UUID=$PP_UUID" >> $GITHUB_ENV
          echo "PP_PATH=$PP_PATH" >> $GITHUB_ENV
          echo "Provisioning Profile UUID: $PP_UUID"

      - name: Write Google Service Info Plist
        env:
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
        run: |
          echo -n "$GOOGLE_SERVICE_INFO_PLIST" | base64 --decode -o ios/Runner/GoogleService-Info.plist

      - name: Create pubspec_overrides.yaml
        run: |
          cat > pubspec_overrides.yaml << 'PYEOF'
          dependency_overrides:
            win32: 5.5.4
            pdf_widget_wrapper: 1.0.4
            mobile_scanner: 5.2.3
          PYEOF

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter precache iOS
        run: flutter precache --ios
      - name: Write Podfile
        run: |
          cat > ios/Podfile << 'PODEOF'
          platform :ios, '13.0'

          ENV['COCOAPODS_DISABLE_STATS'] = 'true'

          project 'Runner', {
            'Debug' => :debug,
            'Profile' => :release,
            'Release' => :release,
          }

          def flutter_root
            generated_xcode_build_settings_path = File.expand_path(File.join('..', 'Flutter', 'Generated.xcconfig'), __FILE__)
            unless File.exist?(generated_xcode_build_settings_path)
              raise "#{generated_xcode_build_settings_path} must exist. If you're running pod install manually, make sure flutter pub get is executed first"
            end
            File.foreach(generated_xcode_build_settings_path) do |line|
              matches = line.match(/FLUTTER_ROOT\=(.*)/)  
              return matches[1].strip if matches
            end
            raise "FLUTTER_ROOT not found in #{generated_xcode_build_settings_path}. Try deleting Generated.xcconfig and running flutter pub get"
          end

          require File.expand_path(File.join('packages', 'flutter_tools', 'bin', 'podhelper'), flutter_root)

          flutter_ios_podfile_setup

          target 'Runner' do
            use_frameworks!
            use_modular_headers!

            flutter_install_all_ios_pods File.dirname(File.realpath(__FILE__))
            target 'RunnerTests' do
              inherit! :search_paths
            end
          end

          post_install do |installer|
            installer.pods_project.targets.each do |target|
              flutter_additional_ios_build_settings(target)
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'
                config.build_settings['CODE_SIGN_IDENTITY'] = ''
                config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
                config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
                config.build_settings['GCC_TREAT_WARNINGS_AS_ERRORS'] = 'NO'
                config.build_settings['SWIFT_TREAT_WARNINGS_AS_ERRORS'] = 'NO'
                config.build_settings['GCC_WARN_INHIBIT_ALL_WARNINGS'] = 'YES'
                config.build_settings['CLANG_WARN_NON_MODULAR_INCLUDE_IN_FRAMEWORK_MODULE'] = 'NO'
                config.build_settings['CLANG_ALLOW_NON_MODULAR_INCLUDES_IN_FRAMEWORK_MODULES'] = 'YES'
                config.build_settings['OTHER_CFLAGS'] = '$(inherited) -Wno-everything'
                config.build_settings['OTHER_CPLUSPLUSFLAGS'] = '$(inherited) -Wno-everything'
                config.build_settings['WARNING_CFLAGS'] = ''
              end
            end
          end
          PODEOF
      - name: Pod install
        run: |
          cd ios
          pod install --repo-update 2>&1 | tail -30

      - name: Patch warning flags from all project files
        run: |
          PBXPROJ="ios/Pods/Pods.xcodeproj/project.pbxproj"
          RUNNER_PBXPROJ="ios/Runner.xcodeproj/project.pbxproj"

          echo "=== Patching Pods pbxproj ==="
          if [ -f "$PBXPROJ" ]; then
            sed -i '' 's/-GCC_WARN_INHIBIT_ALL_WARNINGS//g' "$PBXPROJ"
            sed -i '' 's/-Werror,-Wnon-modular-include-in-framework-module//g' "$PBXPROJ"
            sed -i '' 's/-Werror=non-modular-include-in-framework-module//g' "$PBXPROJ"
            sed -i '' 's/ -Wnon-modular-include-in-framework-module//g' "$PBXPROJ"
            sed -i '' 's/CLANG_WARN_NON_MODULAR_INCLUDE_IN_FRAMEWORK_MODULE = YES[A-Z_]*/CLANG_WARN_NON_MODULAR_INCLUDE_IN_FRAMEWORK_MODULE = NO/g' "$PBXPROJ"
            sed -i '' 's/CLANG_WARN_NON_MODULAR_INCLUDE_IN_FRAMEWORK_MODULE = YES;/CLANG_WARN_NON_MODULAR_INCLUDE_IN_FRAMEWORK_MODULE = NO;/g' "$PBXPROJ"
            echo "CLANG_WARN in Pods pbxproj after patch:"
            grep "CLANG_WARN_NON_MODULAR" "$PBXPROJ" | head -5 || echo "(none - good!)"
          fi

          echo "=== Patching Runner pbxproj ==="
          if [ -f "$RUNNER_PBXPROJ" ]; then
            sed -i '' 's/-GCC_WARN_INHIBIT_ALL_WARNINGS//g' "$RUNNER_PBXPROJ"
            sed -i '' 's/-Werror,-Wnon-modular-include-in-framework-module//g' "$RUNNER_PBXPROJ"
            sed -i '' 's/-Werror=non-modular-include-in-framework-module//g' "$RUNNER_PBXPROJ"
            sed -i '' 's/ -Wnon-modular-include-in-framework-module//g' "$RUNNER_PBXPROJ"
            sed -i '' 's/CLANG_WARN_NON_MODULAR_INCLUDE_IN_FRAMEWORK_MODULE = YES[A-Z_]*/CLANG_WARN_NON_MODULAR_INCLUDE_IN_FRAMEWORK_MODULE = NO/g' "$RUNNER_PBXPROJ"
            sed -i '' 's/CLANG_WARN_NON_MODULAR_INCLUDE_IN_FRAMEWORK_MODULE = YES;/CLANG_WARN_NON_MODULAR_INCLUDE_IN_FRAMEWORK_MODULE = NO;/g' "$RUNNER_PBXPROJ"
            echo "CLANG_WARN in Runner pbxproj after patch:"
            grep "CLANG_WARN_NON_MODULAR" "$RUNNER_PBXPROJ" | head -5 || echo "(none - good!)"
          fi

          echo "=== Patching all xcconfig files ==="
          find ios/Pods -name "*.xcconfig" | while read f; do
            sed -i '' 's/-Werror,-Wnon-modular-include-in-framework-module//g' "$f" 2>/dev/null || true
            sed -i '' 's/-Werror=non-modular-include-in-framework-module//g' "$f" 2>/dev/null || true
            sed -i '' 's/ -Wnon-modular-include-in-framework-module//g' "$f" 2>/dev/null || true
          done

          echo "=== Files still containing non-modular ==="
          grep -rl "non-modular" ios/ 2>/dev/null | head -20 || echo "(none - perfect!)"

      - name: Configure code signing for Runner
        run: |
          RUNNER_PBXPROJ="ios/Runner.xcodeproj/project.pbxproj"
          sed -i '' 's/CODE_SIGN_STYLE = Automatic/CODE_SIGN_STYLE = Manual/g' "$RUNNER_PBXPROJ"
          sed -i '' 's/DEVELOPMENT_TEAM = "";/DEVELOPMENT_TEAM = VHF76Z663B;/g' "$RUNNER_PBXPROJ"
          sed -i '' 's/DEVELOPMENT_TEAM = ""/DEVELOPMENT_TEAM = VHF76Z663B/g' "$RUNNER_PBXPROJ"
                    sed -i '' 's/PROVISIONING_PROFILE_SPECIFIER = "ToolKeeper Distribution"/PROVISIONING_PROFILE_SPECIFIER = "ToolKeeper App Store"/g' "$RUNNER_PBXPROJ"
          sed -i '' 's/PROVISIONING_PROFILE_SPECIFIER = "ToolKeeper Distribution";/PROVISIONING_PROFILE_SPECIFIER = "ToolKeeper App Store";/g' "$RUNNER_PBXPROJ"
          echo "Code signing configured"
      - name: Build and archive iOS app
        run: |
          echo "Using PP UUID: $PP_UUID"
          xcodebuild archive \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath /tmp/Runner.xcarchive \
            -sdk iphoneos \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=VHF76Z663B \
            PROVISIONING_PROFILE="$PP_UUID" \
            PROVISIONING_PROFILE_SPECIFIER="ToolKeeper App Store" \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            CLANG_WARN_NON_MODULAR_INCLUDE_IN_FRAMEWORK_MODULE=NO \
            CLANG_ALLOW_NON_MODULAR_INCLUDES_IN_FRAMEWORK_MODULES=YES \
            GCC_TREAT_WARNINGS_AS_ERRORS=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
            GCC_WARN_INHIBIT_ALL_WARNINGS=YES \
            COMPILER_INDEX_STORE_ENABLE=NO \
            2>&1 | tee /tmp/xcodebuild.log | grep -E '(error:|warning:|ARCHIVE|failed|succeeded)' | head -100
          BUILD_RESULT=${PIPESTATUS[0]}
          echo "Build result: $BUILD_RESULT"
          if [ $BUILD_RESULT -ne 0 ]; then
            echo "=== LAST 200 LINES OF BUILD LOG ==="
            tail -200 /tmp/xcodebuild.log
            exit 1
          fi
          echo "Archive created successfully!"
          ls -la /tmp/Runner.xcarchive/

      - name: Export IPA
        run: |
          cat > /tmp/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>VHF76Z663B</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.toolkeeper.app</key>
              <string>ToolKeeper App Store</string>
            </dict>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath /tmp/Runner.xcarchive \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath /tmp/Runner_export \
            2>&1 | tee /tmp/export.log | grep -E '(error:|exported|failed)' | head -30
          EXPORT_RESULT=${PIPESTATUS[0]}
          if [ $EXPORT_RESULT -ne 0 ]; then
            echo "=== EXPORT LOG ==="
            cat /tmp/export.log
            exit 1
          fi
          echo "IPA exported:"
          ls -la /tmp/Runner_export/

      - name: Upload to TestFlight
        env:
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          echo -n "$ASC_PRIVATE_KEY" | base64 --decode > /tmp/asc_key.p8
          IPA_PATH=$(find /tmp/Runner_export -name "*.ipa" | head -1)
          echo "Uploading IPA: $IPA_PATH"
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID" \
            --private-key-path /tmp/asc_key.p8 \
            2>&1 | tee /tmp/upload.log
          UPLOAD_RESULT=${PIPESTATUS[0]}
          if [ $UPLOAD_RESULT -ne 0 ]; then
            echo "=== UPLOAD LOG ==="
            cat /tmp/upload.log
            exit 1
          fi
          echo "Successfully uploaded to TestFlight!"
