name: iOS App Store Build

on:
  workflow_dispatch:

jobs:
  build_ios:
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: 'stable'

      - name: Install Apple certificate and provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KP=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERT_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KP
          security set-keychain-settings -lut 21600 $KP
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KP
          security import $CERT_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KP
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KP
          security list-keychain -d user -s $KP
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

      - name: Setup Google Services
        env:
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
        run: echo "$GOOGLE_SERVICE_INFO_PLIST" > ios/Runner/GoogleService-Info.plist

      - name: Write pubspec overrides
        run: |
          printf 'dependency_overrides:\n  win32: 5.5.4\n  pdf_widget_wrapper: 1.0.4\n  mobile_scanner: 5.2.3\n' > pubspec_overrides.yaml

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter precache iOS
        run: flutter precache --ios

      - name: Write Podfile
        run: |
          python3 -c "
          lines = [
            \"platform :ios, '13.0'\",
            \"\",
            \"ENV['COCOAPODS_DISABLE_STATS'] = 'true'\",
            \"\",
            \"project 'Runner', {\",
            \"  'Debug' => :debug,\",
            \"  'Profile' => :release,\",
            \"  'Release' => :release,\",
            \"}\",
            \"\",
            \"def flutter_root\",
            \"  generated_xcode_build_settings_path = File.expand_path(File.join('..', 'Flutter', 'Generated.xcconfig'), __FILE__)\",
            \"  unless File.exist?(generated_xcode_build_settings_path)\",
            \"    raise generated_xcode_build_settings_path + ' must exist.'\",
            \"  end\",
            \"  File.foreach(generated_xcode_build_settings_path) do |line|\",
            \"    matches = line.match(/FLUTTER_ROOT\\\\=(.*)/)\" ,
            \"    return matches[1].strip if matches\",
            \"  end\",
            \"  raise 'FLUTTER_ROOT not found'\",
            \"end\",
            \"\",
            \"require File.expand_path(File.join('packages', 'flutter_tools', 'bin', 'podhelper'), flutter_root)\",
            \"\",
            \"flutter_ios_podfile_setup\",
            \"\",
            \"target 'Runner' do\",
            \"  use_frameworks!\",
            \"  use_modular_headers!\",
            \"\",
            \"  flutter_install_all_ios_pods File.dirname(File.realpath(__FILE__))\",
            \"  target 'RunnerTests' do\",
            \"    inherit! :search_paths\",
            \"  end\",
            \"end\",
            \"\",
            \"post_install do |installer|\",
            \"  installer.pods_project.targets.each do |target|\",
            \"    target.build_configurations.each do |config|\",
            \"      config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'\",
            \"      config.build_settings['OTHER_CFLAGS'] = '$(inherited)'\",
            \"      config.build_settings['OTHER_CPLUSPLUSFLAGS'] = '$(inherited)'\",
            \"      config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'\",
            \"      config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'\",
            \"      config.build_settings['CODE_SIGN_IDENTITY'] = ''\",
            \"      config.build_settings.delete('PROVISIONING_PROFILE_SPECIFIER')\",
            \"    end\",
            \"  end\",
            \"end\",
          ]
          with open('ios/Podfile', 'w') as f:
              f.write('\n'.join(lines) + '\n')
          print('Podfile written')
          "

      - name: Configure code signing
        run: |
          python3 -c "
          with open('ios/Runner.xcodeproj/project.pbxproj', 'r') as f:
              content = f.read()
          content = content.replace('CODE_SIGN_STYLE = Automatic;', 'CODE_SIGN_STYLE = Manual;')
          content = content.replace('CODE_SIGN_IDENTITY = \"iPhone Developer\";', 'CODE_SIGN_IDENTITY = \"Apple Distribution\";')
          content = content.replace('DEVELOPMENT_TEAM = \"\";', 'DEVELOPMENT_TEAM = VHF76Z663B;')
          content = content.replace('DEVELOPMENT_TEAM = ;', 'DEVELOPMENT_TEAM = VHF76Z663B;')
          with open('ios/Runner.xcodeproj/project.pbxproj', 'w') as f:
              f.write(content)
          print('Code signing configured')
          "
          sed -i '' '/PROVISIONING_PROFILE_SPECIFIER/d' ios/Runner.xcodeproj/project.pbxproj || true

      - name: Pod install
        run: cd ios && pod install --repo-update

      - name: Build and archive iOS app
        run: |
          security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" $RUNNER_TEMP/app-signing.keychain-db

          PP_UUID=$(python3 -c "
          import plistlib, os
          pp = os.environ['RUNNER_TEMP'] + '/build_pp.mobileprovision'
          with open(pp,'rb') as f: raw=f.read()
          s=raw.find(b'<?xml'); e=raw.find(b'</plist>')+8
          print(plistlib.loads(raw[s:e]).get('UUID',''))
          ")
          echo "PP UUID: $PP_UUID"

          xcodebuild archive \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath build/ios/archive/Runner.xcarchive \
            -destination "generic/platform=iOS" \
            OTHER_CFLAGS='$(inherited)' \
            OTHER_CPLUSPLUSFLAGS='$(inherited)' \
            DEVELOPMENT_TEAM=VHF76Z663B \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE="$PP_UUID"

      - name: Export and sign IPA
        run: |
          PP_UUID=$(python3 -c "
          import plistlib, os
          pp = os.environ['RUNNER_TEMP'] + '/build_pp.mobileprovision'
          with open(pp,'rb') as f: raw=f.read()
          s=raw.find(b'<?xml'); e=raw.find(b'</plist>')+8
          print(plistlib.loads(raw[s:e]).get('UUID',''))
          ")
          python3 -c "
          pp='$PP_UUID'
          q=chr(34); n=chr(10)
          c='<?xml version='+q+'1.0'+q+' encoding='+q+'UTF-8'+q+'?>'+n
          c+='<!DOCTYPE plist PUBLIC '+q+'-//Apple//DTD PLIST 1.0//EN'+q+' '+q+'http://www.apple.com/DTDs/PropertyList-1.0.dtd'+q+'>'+n
          c+='<plist version='+q+'1.0'+q+'><dict>'+n
          c+='<key>method</key><string>app-store</string>'+n
          c+='<key>teamID</key><string>VHF76Z663B</string>'+n
          c+='<key>uploadBitcode</key><false/>'+n
          c+='<key>signingStyle</key><string>manual</string>'+n
          c+='<key>provisioningProfiles</key><dict>'+n
          c+='<key>com.toolkeeper.app</key><string>'+pp+'</string>'+n
          c+='</dict></dict></plist>'
          open('ExportOptions.plist','w').write(c)
          print('ExportOptions written')
          "
          xcodebuild -exportArchive \
            -archivePath build/ios/archive/Runner.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist ExportOptions.plist

      - name: Upload to TestFlight
        env:
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          python3 -c "
          import base64, os
          key = os.environ['ASC_PRIVATE_KEY'].strip()
          try: decoded = base64.b64decode(key).decode('utf-8')
          except: decoded = key
          open(os.path.expanduser('~/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8'),'w').write(decoded)
          print('Key written')
          "
          IPA=$(find build -name '*.ipa' | head -1)
          xcrun altool --upload-app --type ios --file "$IPA" --apiKey "${{ secrets.ASC_KEY_ID }}" --apiIssuer "${{ secrets.ASC_ISSUER_ID }}" --verbose

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ios-ipa
          path: build/ios/ipa/*.ipa
          if-no-files-found: warn
