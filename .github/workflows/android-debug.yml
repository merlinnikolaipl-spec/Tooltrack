name: Android Debug Build
on: {workflow_dispatch: null}
permissions: {contents: write}
jobs: {build: {runs-on: ubuntu-latest, steps: [{uses: actions/checkout@v4}, {name: Setup Java, uses: actions/setup-java@v4, with: {distribution: zulu, java-version: '17'}}, {name: Setup Flutter, uses: subosito/flutter-action@v2, with: {channel: stable}}, {name: Install dependencies, run: flutter pub get}, {name: Generate persistent debug keystore, run: "test -f android/app/debug.keystore || keytool -genkeypair -v -keystore android/app/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname \"CN=Android Debug,O=Android,C=US\""}, {name: Print debug keystore SHA1, run: "keytool -list -v -keystore android/app/debug.keystore -storepass android -alias androiddebugkey"}, {name: Commit debug keystore if new, run: "if git ls-files --error-unmatch android/app/debug.keystore > /dev/null 2>&1; then echo \"Keystore already tracked\"; else git config user.name \"github-actions[bot]\"; git config user.email \"github-actions[bot]@users.noreply.github.com\"; git add -f android/app/debug.keystore; git commit -m \"chore: add persistent debug keystore\"; git push; fi"}, {name: Build debug APK, run: flutter build apk --debug}, {name: Upload APK, uses: actions/upload-artifact@v4, with: {name: Tooltrack-debug-apk, path: build/app/outputs/flutter-apk/app-debug.apk}}, {name: Upload debug keystore, uses: actions/upload-artifact@v4, with: {name: debug-keystore, path: android/app/debug.keystore}}]}}
