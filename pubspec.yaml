name: tooltrack
description: ToolTrack app for construction crews.
publish_to: 'none'
version: 1.1.0+114

environment:
  sdk: '>=3.3.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^2.31.0
  firebase_crashlytics: ^3.4.9
  firebase_auth: ^4.19.5
  cloud_firestore: ^4.17.3
  google_sign_in: ^6.2.1
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  image_picker: ^1.1.2
  firebase_storage: ^11.7.5
  url_launcher: ^6.2.6
  qr_flutter: ^4.1.0
  permission_handler: ^11.3.1
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.3
  geolocator: ^12.0.0
  path_provider: ^2.1.0
  share_plus: ^7.2.2
  excel: ^4.0.6
  pdf: ^3.10.8
  printing: ^5.12.0
  connectivity_plus: ^5.0.2
  flutter_background_service: ^5.1.0
  http: ^1.2.0
  mobile_scanner: ^5.2.0
  flutter_launcher_icons: ^0.13.1
  home_widget: ^0.9.2

dependency_overrides:
  win32: '5.5.3'

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/fonts/
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
