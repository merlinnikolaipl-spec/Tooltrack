name: tooltrack_app
description: ToolTrack app
publish_to: none
version: 1.1.0+23

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.24.0
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  google_sign_in: ^6.1.6
  path_provider: ^2.1.1
  share_plus: ^10.0.0
  pdf: ^3.11.3
  printing: ^5.12.0
  excel: ^4.0.6
  cross_file: ^0.3.3+8
  flutter_launcher_icons: ^0.13.1
  geolocator: ^11.0.0
  url_launcher: ^6.3.0
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  connectivity_plus: ^5.0.2
  qr_flutter: ^4.1.0
  mobile_scanner: ^4.0.1
  flutter_background_service: ^5.0.9
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

dependency_overrides:
  win32: '>=5.5.0 <7.0.0'

flutter:
  uses-material-design: true
  assets:
    - assets/images/
