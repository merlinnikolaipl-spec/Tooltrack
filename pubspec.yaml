  sdk: ^3.10.4
dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^4.3.0
  firebase_auth: ^6.1.3
  cloud_firestore: ^6.1.1
  google_sign_in: ^6.2.1
  path_provider: ^2.1.5
  share_plus: ^12.0.1
  pdf: ^3.11.3
  printing: ^5.13.0
